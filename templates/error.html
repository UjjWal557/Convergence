{% extends "layout.html" %}

{% block content %}
<div class="dashboard-container" style="display: flex; align-items: center; justify-content: center; height: 80vh;">
    <div class="error-card" style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 500px;">
        <div style="font-size: 4rem; color: #ef4444; margin-bottom: 20px;">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <h1 style="color: #1e293b; margin-bottom: 10px;">Oops! Something went wrong</h1>
        <p style="color: #64748b; line-height: 1.6; margin-bottom: 30px;">
            {{ error_message if error_message else "An unexpected error occurred while processing your request." }}
        </p>
        <div style="display: flex; gap: 15px; justify-content: center;">
            <a href="/" class="nav-link" style="padding: 12px 24px; background: #f1f5f9; color: #475569; border-radius: 8px; text-decoration: none; font-weight: 500;">
                Go to Dashboard
            </a>
            <a href="/upload" class="nav-link" style="padding: 12px 24px; background: #2563eb; color: white; border-radius: 8px; text-decoration: none; font-weight: 500;">
                Try Again
            </a>
        </div>
    </div>
</div>
{% endblock %}
